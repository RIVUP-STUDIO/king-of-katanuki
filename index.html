<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KING OF KATANUKI（試作）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="stage">
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div id="hud" class="hidden">
    <div id="needleName"></div>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <div id="timer">0.0s</div>
  </div>

  <canvas id="game"></canvas>

  <div class="legend hidden" id="legend">
    <span><i class="dot" style="background:var(--safe)"></i>セーフ</span>
    <span><i class="dot" style="background:var(--warn)"></i>ズレ</span>
    <span><i class="dot" style="background:var(--danger)"></i>危険=即アウト</span>
  </div>

  <div class="overlay" id="titleScreen">
    <div class="stageLabel">PROJECT ENNICHI ／ 縁日 第一弾</div>
    <h1 class="title">KING<br>OF<br>KATANUKI<span class="sub">型 抜 き の 王</span></h1>
    <div class="stageList" id="stageList"></div>
  </div>

  <div class="overlay hidden" id="gameoverScreen">
    <div class="stageLabel" style="color:var(--danger)">割れた…</div>
    <h1 class="title" style="font-size:clamp(30px,9vw,48px)">GAME OVER</h1>
    <button class="cta" id="retryBtn">もう一度</button>
    <button class="linkBtn" id="backBtnOver">ステージ選択へ</button>
  </div>

  <div class="overlay hidden" id="clearScreen">
    <div class="stageLabel" style="color:var(--safe)">CLEAR</div>
    <h1 class="title" style="font-size:clamp(30px,9vw,48px)">抜けた！</h1>
    <div class="resultTime">クリアタイム <b id="clearTime">0.00s</b></div>
    <button class="cta" id="nextBtn">つぎのステージへ</button>
    <button class="linkBtn" id="backBtnClear">ステージ選択へ</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
